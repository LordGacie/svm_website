<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Version Comparison</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .controls { margin-bottom: 20px; }
        select {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        .img-comp-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9; /* Sets a responsive widescreen box. Adjust if your images are 4:3! */
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            overflow: hidden;
            background-color: #eee;
        }
        .img-comp-img {
            position: absolute;
            width: auto;
            height: 100%;
            overflow: hidden;
            user-select: none;
        }
        .img-comp-img img {
            display: block;
            vertical-align: middle;
            width: 800px; /* Must match max-width of container */
            max-width: none;
            height: 100%;
            object-fit: contain;
        }
        .img-comp-slider {
            position: absolute;
            z-index: 9;
            cursor: ew-resize;
            width: 40px;
            height: 40px;
            background-color: #2196F3;
            opacity: 0.9;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h2>Image Version Comparison</h2>
    <p>Select a date slice, then drag the blue slider to compare Version 1 (Left) and Version 2 (Right).</p>

    <div class="controls">
        <label for="dateSelect"><strong>Select Dataset:</strong> </label>
        <select id="dateSelect" onchange="changeDate()">
            <option value="pair0" selected>2026-06-24_03.04.36</option>
            <option value="pair1" >2026-06-24_03.06.00</option>
            <option value="pair2" >2026-06-24_03.06.19</option>
            <option value="pair3" >2026-06-24_03.06.35</option>
            <option value="pair4" >2026-06-24_03.07.04</option>
        </select>
    </div>

    <div class="img-comp-container">
        <div class="img-comp-img">
            <img id="v2-img" src="data/2/2026-06-24_03.14.17.png" alt="Version 2">
        </div>
        <div class="img-comp-img img-comp-overlay">
            <img id="v1-img" src="data/1/2026-06-24_03.04.36.png" alt="Version 1">
        </div>
    </div>

<script>
    const imagePairs = {
        "pair0": { v1: "data/1/2026-06-24_03.04.36.png", v2: "data/2/2026-06-24_03.14.17.png" },
        "pair1": { v1: "data/1/2026-06-24_03.06.00.png", v2: "data/2/2026-06-24_03.14.21.png" },
        "pair2": { v1: "data/1/2026-06-24_03.06.19.png", v2: "data/2/2026-06-24_03.14.25.png" },
        "pair3": { v1: "data/1/2026-06-24_03.06.35.png", v2: "data/2/2026-06-24_03.14.30.png" },
        "pair4": { v1: "data/1/2026-06-24_03.07.04.png", v2: "data/2/2026-06-24_03.14.36.png" },
    };

    function changeDate() {
        const selectedDate = document.getElementById("dateSelect").value;
        
        document.getElementById("v1-img").src = imagePairs[selectedDate].v1;
        document.getElementById("v2-img").src = imagePairs[selectedDate].v2;
        
        // Reset slider to center
        const overlay = document.querySelector(".img-comp-overlay");
        const slider = document.querySelector(".img-comp-slider");
        const container = document.querySelector(".img-comp-container");
        
        let w = container.offsetWidth;
        overlay.style.width = (w / 2) + "px";
        if(slider) slider.style.left = (w / 2) + "px";
    }

    function initComparisons() {
        let x = document.getElementsByClassName("img-comp-overlay");
        for (let i = 0; i < x.length; i++) {
            compareImages(x[i]);
        }

        function compareImages(img) {
            let slider, clicked = 0, w, h;
            
            // Adjust overlay image baseline match to full container width
            const updateDimensions = () => {
                w = img.parentElement.offsetWidth;
                h = img.parentElement.offsetHeight;
                img.querySelector("img").style.width = w + "px";
                img.parentElement.querySelector("img").style.width = w + "px";
                img.style.width = (w / 2) + "px";
            };
            
            updateDimensions();
            
            slider = document.createElement("DIV");
            slider.setAttribute("class", "img-comp-slider");
            slider.innerHTML = "↔";
            img.parentElement.insertBefore(slider, img);
            
            slider.style.top = (h / 2) - (slider.offsetHeight / 2) + "px";
            slider.style.left = (w / 2) - (slider.offsetWidth / 2) + "px";
            
            slider.addEventListener("mousedown", slideReady);
            window.addEventListener("mouseup", slideFinish);
            slider.addEventListener("touchstart", slideReady);
            window.addEventListener("touchend", slideFinish);
            window.addEventListener("resize", updateDimensions);

            function slideReady(e) {
                e.preventDefault();
                clicked = 1;
                window.addEventListener("mousemove", slideMove);
                window.addEventListener("touchmove", slideMove);
            }

            function slideFinish() { clicked = 0; }

            function slideMove(e) {
                if (clicked == 0) return false;
                let pos = getCursorX(e);
                if (pos < 0) pos = 0;
                if (pos > w) pos = w;
                img.style.width = pos + "px";
                slider.style.left = img.offsetWidth + "px";
            }

            function getCursorX(e) {
                e = (e.changedTouches) ? e.changedTouches[0] : e;
                let a = img.getBoundingClientRect();
                return e.clientX - a.left;
            }
        }
    }

    initComparisons();
</script>

</body>
</html>
