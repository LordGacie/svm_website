<!DOCTYPE html>
<html lang="en" class="dark-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Better Dappled Forest Datapack Showcase</title>
    
    <link rel="icon" type="image/png" href="data/icon.png">
    
    <style>
        * { box-sizing: border-box; }
        
        /* Base Themes (Driven by Python Config) */
        html.dark-mode body {
            background-color: #121214;
            color: #b3b3b3;
        }
        html.dark-mode h2, html.dark-mode h3 {
            color: #e0e0e0;
        }
        html.dark-mode .frame-wrapper {
            background-color: #1a1a1e;
            border: 1px solid #2a2a30;
        }
        html.dark-mode .frame-wrapper:hover {
            background-color: #24242a;
            border-color: #3a3a45;
        }
        
        html.light-mode body {
            background-color: #f4f4f9;
            color: #444444;
        }
        html.light-mode h2, html.light-mode h3 {
            color: #111111;
        }
        html.light-mode .frame-wrapper {
            background-color: #ffffff;
            border: 1px solid #e0e0e6;
        }
        html.light-mode .frame-wrapper:hover {
            background-color: #fafafc;
            border-color: #5fab49;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .header-container {
            display: flex;
            align-items: center;
            max-width: 860px;
            width: 100%;
            margin-bottom: 40px;
            gap: 20px;
        }

        .header-icon {
            width: 64px;
            height: 64px;
            object-fit: contain;
            border-radius: 4px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .header-text {
            display: flex;
            flex-direction: column;
        }

        .header-text h2 {
            margin: 0 0 5px 0;
        }

        .header-text p {
            margin: 0;
        }

        .theme-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 20px;
            border: 1px solid #444;
            background-color: #222;
            color: #fff;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background-color 0.2s, color 0.2s;
        }
        html.light-mode .theme-toggle-btn {
            background-color: #fff;
            color: #222;
            border: 1px solid #ccc;
        }

        .comparison-block {
            margin-bottom: 50px;
            width: 100%;
            max-width: 860px;
            text-align: center;
        }

        .comparison-block h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-align: left;
            padding-left: 24px;
        }

        .frame-wrapper {
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            transition: background-color 0.25s ease, border-color 0.25s ease;
        }

        .img-comp-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background-color: #000;
            border-radius: 8px;
        }

        .img-comp-img {
            position: absolute;
            width: auto;
            height: 100%;
            overflow: hidden;
            user-select: none;
        }

        .img-comp-img img {
            display: block;
            vertical-align: middle;
            width: 800px; 
            max-width: none;
            height: 100%;
            object-fit: cover; 
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            transform: scale(1);
        }

        .frame-wrapper:hover .img-comp-img img {
            transform: scale(1.03);
        }

        .img-comp-slider {
            position: absolute;
            z-index: 9;
            cursor: ew-resize;
            width: 40px;
            height: 40px;
            background-color: #5fab49;
            opacity: 0.85;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            user-select: none;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), 
                        background-color 0.2s ease, 
                        opacity 0.2s ease;
        }

        .frame-wrapper:hover .img-comp-slider {
            transform: translate(-50%, -50%) scale(1.15);
            background-color: #98bd68;
            opacity: 1;
        }

        .img-comp-slider:active, .frame-wrapper:hover .img-comp-slider:active {
            transform: translate(-50%, -50%) scale(0.92);
            background-color: #507d39;
            box-shadow: 0 0 5px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

    <button class="theme-toggle-btn" onclick="toggleTheme()">☀️ Light Mode</button>

    <div class="header-container">
        <img class="header-icon" src="data/icon.png" alt="Icon" onerror="this.style.display='none';">
        <div class="header-text">
            <h2>Better Dappled Forest Datapack</h2>
            <p>Drag each blue slider to compare Vanilla (Left) and Datapack (Right).</p>
        </div>
    </div>


    <div class="comparison-block">
        <h3>Image #1</h3>
        <div class="frame-wrapper">
            <div class="img-comp-container">
                <div class="img-comp-img">
                    <img src="data/2/2026-06-24_21.22.33.png" alt="Datapack">
                </div>
                <div class="img-comp-img img-comp-overlay">
                    <img src="data/1/2026-06-24_21.21.13.png" alt="Vanilla">
                </div>
            </div>
        </div>
    </div>

    <div class="comparison-block">
        <h3>Image #2</h3>
        <div class="frame-wrapper">
            <div class="img-comp-container">
                <div class="img-comp-img">
                    <img src="data/2/2026-06-24_21.22.39.png" alt="Datapack">
                </div>
                <div class="img-comp-img img-comp-overlay">
                    <img src="data/1/2026-06-24_21.21.17.png" alt="Vanilla">
                </div>
            </div>
        </div>
    </div>

    <div class="comparison-block">
        <h3>Image #3</h3>
        <div class="frame-wrapper">
            <div class="img-comp-container">
                <div class="img-comp-img">
                    <img src="data/2/2026-06-24_21.22.44.png" alt="Datapack">
                </div>
                <div class="img-comp-img img-comp-overlay">
                    <img src="data/1/2026-06-24_21.21.20.png" alt="Vanilla">
                </div>
            </div>
        </div>
    </div>

    <div class="comparison-block">
        <h3>Image #4</h3>
        <div class="frame-wrapper">
            <div class="img-comp-container">
                <div class="img-comp-img">
                    <img src="data/2/2026-06-24_21.22.50.png" alt="Datapack">
                </div>
                <div class="img-comp-img img-comp-overlay">
                    <img src="data/1/2026-06-24_21.21.27.png" alt="Vanilla">
                </div>
            </div>
        </div>
    </div>

    <div class="comparison-block">
        <h3>Image #5</h3>
        <div class="frame-wrapper">
            <div class="img-comp-container">
                <div class="img-comp-img">
                    <img src="data/2/2026-06-24_21.22.57.png" alt="Datapack">
                </div>
                <div class="img-comp-img img-comp-overlay">
                    <img src="data/1/2026-06-24_21.21.33.png" alt="Vanilla">
                </div>
            </div>
        </div>
    </div>


<script>
    function toggleTheme() {
        const html = document.documentElement;
        const btn = document.querySelector('.theme-toggle-btn');
        if (html.classList.contains('dark-mode')) {
            html.classList.remove('dark-mode');
            html.classList.add('light-mode');
            btn.innerHTML = "🌙 Dark Mode";
        } else {
            html.classList.remove('light-mode');
            html.classList.add('dark-mode');
            btn.innerHTML = "☀️ Light Mode";
        }
    }

    function initComparisons() {
        let x = document.getElementsByClassName("img-comp-overlay");
        for (let i = 0; i < x.length; i++) {
            compareImages(x[i]);
        }

        function compareImages(img) {
            let slider, clicked = 0, w, h;
            
            const updateDimensions = () => {
                w = img.parentElement.offsetWidth;
                h = img.parentElement.offsetHeight;
                
                const internalImages = img.parentElement.querySelectorAll("img");
                internalImages.forEach(image => {
                    image.style.width = w + "px";
                });
                
                img.style.width = (w / 2) + "px";
                if(slider) slider.style.left = (w / 2) + "px";
            };
            
            slider = document.createElement("DIV");
            slider.setAttribute("class", "img-comp-slider");
            slider.innerHTML = "↔";
            img.parentElement.insertBefore(slider, img);
            
            updateDimensions();
            
            slider.style.top = (h / 2) - (slider.offsetHeight / 2) + "px";
            
            slider.addEventListener("mousedown", slideReady);
            window.addEventListener("mouseup", slideFinish);
            slider.addEventListener("touchstart", slideReady);
            window.addEventListener("touchend", slideFinish);
            window.addEventListener("resize", updateDimensions);

            function slideReady(e) {
                e.preventDefault();
                clicked = 1;
                window.addEventListener("mousemove", slideMove);
                window.addEventListener("touchmove", slideMove);
            }

            function slideFinish() { clicked = 0; }

            function slideMove(e) {
                if (clicked == 0) return false;
                let pos = getCursorX(e);
                if (pos < 0) pos = 0;
                if (pos > w) pos = w;
                img.style.width = pos + "px";
                slider.style.left = img.offsetWidth + "px";
            }

            function getCursorX(e) {
                e = (e.changedTouches) ? e.changedTouches[0] : e;
                let a = img.getBoundingClientRect();
                return e.clientX - a.left;
            }
        }
    }

    initComparisons();
</script>

</body>
</html>
